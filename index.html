<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sadiya 💖</title>

<style>

body{
    margin:0;
    padding:0;
    background:linear-gradient(to bottom,#0f0c29,#302b63,#24243e);
    font-family:Arial, sans-serif;
    overflow-x:hidden;
    color:white;
    text-align:center;
}

.container{
    padding:30px 20px;
}

h1{
    font-size:3rem;
    color:#ffd700;
    animation:glow 2s infinite alternate;
}

h2{
    font-size:2rem;
    margin-top:-10px;
}

p{
    font-size:1.2rem;
    max-width:700px;
    margin:auto;
    line-height:1.8;
}

.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-top:40px;
}

.gallery img{
    width:250px;
    height:320px;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 0 20px rgba(255,255,255,0.3);
    transition:0.5s;
}

.gallery img:hover{
    transform:scale(1.05);
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #ffd700;
    }
    to{
        text-shadow:0 0 25px #ffcc00;
    }
}

.hearts{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    pointer-events:none;
    overflow:hidden;
}

.hearts span{
    position:absolute;
    bottom:-50px;
    font-size:24px;
    animation:float 10s linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(0) rotate(0deg);
        opacity:1;
    }
    100%{
        transform:translateY(-1000px) rotate(360deg);
        opacity:0;
    }
}

.footer{
    margin-top:50px;
    font-size:1rem;
    opacity:0.8;
}

</style>
</head>

<body>

<div class="container">

<h1>Happy Birthday 🎂</h1>

<h2>Sheikh Sadiya Batool 💖</h2>

<p>
May your smile always shine brighter than the stars ✨  
Wishing you endless happiness, love, success, and beautiful memories.  
You are truly special and deserve the best birthday ever 💕
</p>

<div class="gallery">

<img src="https://i.postimg.cc/5tM6k6NF/Whats-App-Image-2026-05-10-at-14-28-20.jpg">

</div>

<br><br>



<div class="footer">
Made with ❤️ for Sadiya
</div>

</div>

<div class="hearts">
<span style="left:10%; animation-delay:0s;">💖</span>
<span style="left:20%; animation-delay:2s;">✨</span>
<span style="left:35%; animation-delay:4s;">🌸</span>
<span style="left:50%; animation-delay:1s;">💫</span>
<span style="left:70%; animation-delay:3s;">💖</span>
<span style="left:85%; animation-delay:5s;">✨</span>
</div>

</body>
</html>
